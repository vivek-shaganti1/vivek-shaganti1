name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate Snake
        uses: DenverCoder1/github-readme-streak-stats@main

      - name: Create Snake SVG
        run: |
          mkdir -p dist
          curl -o dist/github-contribution-grid-snake-dark.svg https://raw.githubusercontent.com/Platane/snk/output/github-contribution-grid-snake-dark.svg

      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
